<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neily Chávez | Portafolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Yusei+Magic&display=swap" rel="stylesheet">
</head>
<body>

    <section id="intro" class="pantalla-intro">
        <div class="logo-contenedor">
            <img src="IMAGENES/LOGO.png" alt="Logo Neily Chávez" class="logo-interactivo" onclick="entrarAlSitio()">
        </div>
        <p class="indicador-toca">TOCA EL LOGO PARA ENTRAR</p>
    </section>

    <nav class="menu-navegacion">
        <div class="menu-marca">
            <img src="IMAGENES/LOGO.png" alt="Mini Logo" class="mini-logo">
        </div>
        <div class="menu-enlaces">
            <a href="index.html" class="activo">Inicio</a>
            <a href="sobre mi.html">Conóceme</a>
            <a href="poryectos.html">Trabajos</a>
            <a href="contacto.html">Contacto</a>
        </div>
    </nav>

    <section id="portada-principal" class="pantalla-portada">
        <div class="contenido-portada">
            <div class="contenedor-asimetrico">
                <h1 class="txt-porta">PORTA</h1>
                <h1 class="txt-folio">FOLIO</h1>
            </div>
            <div class="bloque-firma">
                <p class="nombre-autor">NEILY CHÁVEZ</p>
            </div>
            <a href="sobre mi.html" class="boton-cta">Sobre mí</a>
        </div>
    </section>
    <script>
        function entrarAlSitio() {
            const intro = document.getElementById('intro');
            intro.classList.add('desvanecer'); // Aplica el efecto de desaparecer
            
            // Espera a que termine la animación (0.6s) y salta suave a la portada
            setTimeout(() => {
                intro.style.display = 'none';
                window.scrollTo({
                    top: document.getElementById('portada-principal').offsetTop,
                    behavior: 'smooth'
                });
            }, 600);
        }
    </script>

</body>
</html>
